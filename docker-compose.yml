version: "3.8"

services:
  db:
    image: mysql:latest
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=db1
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  devhill:
    build: backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/db1
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    networks:
      - proxy
      - backend
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - devhill
    volumes:
      - ./nginx.conf:/etc/nginx.conf:ro
      - ./front:/usr/share/nginx/html:ro
    networks:
      - proxy

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - nginx
    volumes:
      - ./.cloudflared/cloudflare.yml:/etc/cloudflared/config.yml:ro
      - ./.cloudflared/${TUNNEL_TOKEN}.json:/etc/cloudflared/creds.json:ro
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    networks:
      - proxy

networks:
  proxy:
  backend:

volumes:
  dbdata: